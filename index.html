<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Artesanías Cola Blanca</title>

    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

<style>
body {

    margin: 0;

    background: #ffffff;
    color: #222;

    color: #2B302E;

    font-family: Arial, sans-serif;

}

/* HEADER */

.header {

    background: #ffffff;

    color: white;

    text-align: center;

    padding: 20px 20px 25px;

}


.header h1 {

    font-family: "Pirata One", cursive;

    font-size: 34px;

    font-weight: normal;

    color: #5f5f5f;

    margin: 0 0 12px;

}


/* LOGO */

.logo{
    width: 250px;
    height: auto;
    display: block;
    margin: 10px auto 15px;
}

/* SUBTITULO */

.header p {

    margin: 0;

    font-size: 15px;

    letter-spacing: 2px;

    color: #2B302E;

}

.productos {

    padding: 50px 30px;

    max-width: 1200px;

    margin: auto;

}



.productos h2 {

    text-align: center;

    font-family: "Pirata One", cursive;

    font-size: 42px;

    font-weight: normal;

    color: #5f5f5f;

    margin-bottom: 40px;

}



/* GRID */

.grid-productos {

    display: grid;

    grid-template-columns: repeat(3, 1fr);

    gap: 30px;

}



/* TARJETAS */

.producto {

    background: #F4F5F3;

    padding: 20px;

    border-radius: 15px;

    text-align: center;

    transition: transform .3s ease;

}



.producto:hover {

    transform: translateY(-8px);

}



/* IMAGENES */

.producto img {

    width: 100%;

    height: 320px;

    object-fit: cover;

    border-radius: 12px;

}



/* TITULO PRODUCTO */

.producto h3 {

    font-size: 20px;

    font-weight: normal;

    margin: 20px 0;

}



/* BOTONES */

.producto button {


    background: #61786D;

    color: white;

    border: none;

    padding: 12px 25px;

    border-radius: 25px;

    cursor: pointer;

    font-size: 15px;

    transition: .3s;

}



.producto button:hover {


    background: #3B8D6B;

}
/* MENU */


.menu {

    background: #3A403D;

    display: flex;

    justify-content: center;

    gap: 35px;

    padding: 12px;

    border-top: 1px solid rgba(255,255,255,0.15);

}



.menu a {

    color: white;

    text-decoration: none;

    font-size: 15px;

    letter-spacing: 1px;

    transition: .3s;

}



.menu a:hover {

    color: #A8C3B0;

}

.heart{
    color: #ffffff;
    font-size: 12px;
    margin-right: 8px;
    -webkit-text-stroke: 1px #888;
}

/* SECCIÓN INSPIRACIÓN NATURAL */

.inspiracion{

    background:#ffffff;

    text-align:center;

    padding:60px 30px;

    overflow:hidden;

}


.venado-movimiento{

    width:100%;

    height:180px;

    overflow:hidden;

    position:relative;

}


.venado{

    width:150px;

    position:absolute;

    bottom:0;

    left:-180px;

    animation:correrVenado 12s linear infinite;

}


@keyframes correrVenado{

    from{

        transform:translateX(0);

    }


    to{

        transform:translateX(calc(100vw + 200px));

    }

}



.inspiracion h2{

    font-family:"Pirata One", cursive;

    font-size:42px;

    font-weight:normal;

    color:#5f5f5f;

    margin-top:30px;

}



.inspiracion p{

    max-width:700px;

    margin:20px auto;

    font-size:17px;

    line-height:1.7;

    color:#555;

}
    
</style>
</head>

<body>


<header class="header">

    <h1>Artesanías Cola Blanca</h1>

    <p>100% costarricense</p>

</header>

<nav class="menu">

    <a href="#"><span class="heart">♡</span>Inicio</a>

    <a href="#coleccion"><span class="heart">♡</span>Colección</a>

    <a href="#contacto"><span class="heart">♡</span>Contacto</a>

    <a href="https://www.instagram.com/artesaniascola_blanca/">
        <span class="heart">♡</span>Instagram
    </a>

</nav>

<section class="inspiracion">

    <div class="venado-container">

        <img 
        src="white_deer.svg" 
        alt="Venado cola blanca"
        class="venado">

    </div>

    <h2>Conectados con la naturaleza</h2>

    <p>
     Una señal blanca entre el verde del bosque.
    </p>

</section>

  <main>


<section class="productos" id="coleccion">


    <h2>Nuestra Colección</h2>


    <div class="grid-productos">


        <div class="producto">

            <img src="ambiente/outdoor-handmade-natural.jpg" alt="Producto artesanal">

            <h3>Producto artesanal</h3>

            <button>Ver producto</button>

        </div>



        <div class="producto">

            <img src="bisuteria/aretes-artesanales-macrame-modelo-1.jpg" alt="Producto artesanal">

            <h3>Producto artesanal</h3>

            <button>Ver producto</button>

        </div>



        <div class="producto">

            <img src="bolso/bolso-rosado-artesanal-macrame.jpg" alt="Producto artesanal">

            <h3>Producto artesanal</h3>

            <button>Ver producto</button>

        </div>



    </div>


</section>

</main>


<footer>

    © 2026 Artesanías Cola Blanca

</footer>


</body>

</html>
