<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Artesanías Cola Blanca</title>

    <link rel="stylesheet" href="style.css">

<style>
/* SECCION PRODUCTOS */


.productos {

    padding: 50px 30px;

    max-width: 1200px;

    margin: auto;

}



.productos h2 {

    text-align: center;

    font-family: "Pirata One", cursive;

    font-size: 42px;

    font-weight: normal;

    color: #2B302E;

    margin-bottom: 40px;

}



/* GRID */

.grid-productos {

    display: grid;

    grid-template-columns: repeat(3, 1fr);

    gap: 30px;

}



/* TARJETAS */

.producto {

    background: white;

    padding: 20px;

    border-radius: 15px;

    text-align: center;

    transition: transform .3s ease;

}



.producto:hover {

    transform: translateY(-8px);

}



/* IMAGENES */

.producto img {

    width: 100%;

    height: 320px;

    object-fit: cover;

    border-radius: 12px;

}



/* TITULO PRODUCTO */

.producto h3 {

    font-size: 20px;

    font-weight: normal;

    margin: 20px 0;

}



/* BOTONES */

.producto button {


    background: #285C46;

    color: white;

    border: none;

    padding: 12px 25px;

    border-radius: 25px;

    cursor: pointer;

    font-size: 15px;

    transition: .3s;

}



.producto button:hover {


    background: #3B8D6B;

}
/* MENU */


.menu {

    background: #2B302E;

    display: flex;

    justify-content: center;

    gap: 35px;

    padding: 12px;

    border-top: 1px solid rgba(255,255,255,0.15);

}



.menu a {

    color: white;

    text-decoration: none;

    font-size: 15px;

    letter-spacing: 1px;

    transition: .3s;

}



.menu a:hover {

    color: #A8C3B0;

}
</style>
</head>

<body>


<header class="header">

    <h1>Artesanías Cola Blanca</h1>

    <img 
    src="venado.jpg" 
    alt="Logo Artesanías Cola Blanca"
    class="logo">

    <p>100% costarricense</p>

</header>

<nav class="menu">

    <a href="#">Inicio</a>

    <a href="#coleccion">Colección</a>

    <a href="#contacto">Contacto</a>

    <a href="#">Instagram</a>

</nav>

  <main>


<section class="productos" id="coleccion">


    <h2>Nuestra Colección</h2>


    <div class="grid-productos">


        <div class="producto">

            <img src="ambiente/outdoor-handmade-natural.jpg" alt="Producto artesanal">

            <h3>Producto artesanal</h3>

            <button>Ver producto</button>

        </div>



        <div class="producto">

            <img src="producto2.jpg" alt="Producto artesanal">

            <h3>Producto artesanal</h3>

            <button>Ver producto</button>

        </div>



        <div class="producto">

            <img src="producto3.jpg" alt="Producto artesanal">

            <h3>Producto artesanal</h3>

            <button>Ver producto</button>

        </div>



    </div>


</section>

</main>


<footer>

    © 2026 Artesanías Cola Blanca

</footer>


</body>

</html>
